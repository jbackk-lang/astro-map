<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Astro Map – Galeria NASA</title>
    <style>
        body { font-family: Arial; background: #111; color: #eee; padding: 20px; }
        h1 { color: #6cf; }
        .img-box { background: #222; padding: 20px; margin-bottom: 20px; border-radius: 8px; }
        img { max-width: 100%; border: 2px solid #444; border-radius: 6px; }
        button { padding: 10px 20px; font-size: 16px; margin-top: 20px; }
    </style>
</head>
<body>

<h1>Galeria NASA – Astro Map</h1>
<p>Automatycznie pobierane zdjęcia z NASA APOD.</p>

<div id="gallery"></div>

<button onclick="loadImages()">Załaduj zdjęcia</button>

<script>
async function loadImages() {
    const gallery = document.getElementById("gallery");
    gallery.innerHTML = "<p>Ładowanie...</p>";

    const urls = [
        "https://api.nasa.gov/planetary/apod?api_key=DEMO_KEY&count=5"
    ];

    const res = await fetch(urls[0]);
    const data = await res.json();

    gallery.innerHTML = "";

    data.forEach(item => {
        const box = document.createElement("div");
        box.className = "img-box";

        box.innerHTML = `
            <h2>${item.title}</h2>
            <img src="${item.url}" alt="${item.title}">
            <p>${item.date}</p>
            <p>${item.explanation}</p>
        `;

        gallery.appendChild(box);
    });
}
</script>

</body>
</html>
